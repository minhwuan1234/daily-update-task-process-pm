# ============================================================
#  daily-tracking.yml
#  Repo: daily-update-task-process-pm
#  Dat file nay tai: .github/workflows/daily-tracking.yml
# ============================================================
#
#  Trigger:
#    1. Tu dong khi responses.json thay doi (member submit form)
#    2. Thu cong qua tab Actions tren GitHub
#
# ============================================================

name: Daily Tracking Update

on:
  push:
    branches: [main]
    paths:
      - "responses.json"

  workflow_dispatch:

jobs:
  run-tracking:
    name: Run update-tracking.js
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure tracking directory exists
        run: mkdir -p tracking

      - name: Init tracking files if missing
        run: |
          [ -f tracking/daily-update-submissions.json ] || echo "[]" > tracking/daily-update-submissions.json
          [ -f tracking/daily-update-summary.json ]     || echo "{}" > tracking/daily-update-summary.json

      - name: Run update-tracking.js
        run: node scripts/update-tracking.js

      - name: Commit tracking output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add tracking/daily-update-submissions.json
          git add tracking/daily-update-summary.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update tracking $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
