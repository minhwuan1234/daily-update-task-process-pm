name: Fetch Lark Tasks

on:
  workflow_run:
    workflows: ["Receive Daily Tasks"]
    types: [completed]
  workflow_dispatch:  # giữ lại để vẫn có thể chạy thủ công
  
jobs:
  fetch-tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch tasks from Lark
        env:
          USER_TOKEN:   ${{ secrets.LARK_USER_TOKEN }}
          TASKLIST_IDS: ${{ secrets.LARK_TASKLIST_ID }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, urllib.error
          from datetime import datetime

          USER_TOKEN   = os.environ['USER_TOKEN']
          TASKLIST_IDS = [tid.strip() for tid in os.environ['TASKLIST_IDS'].split(',') if tid.strip()]

          def lark_get(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      'Authorization': f'Bearer {USER_TOKEN}',
                      'Content-Type':  'application/json',
                  }
              )
              try:
                  with urllib.request.urlopen(req) as res:
                      return json.loads(res.read())
              except urllib.error.HTTPError as e:
                  body = e.read().decode('utf-8')
                  print(f"HTTPError {e.code} for {url}")
                  print(f"Response body: {body}")
                  raise

          def parse_ts(ts):
              if not ts: return None
              return datetime.utcfromtimestamp(int(ts) / 1000).strftime('%Y-%m-%dT%H:%M:%SZ')

          all_tasks = []

          for tasklist_id in TASKLIST_IDS:
              print(f"\nFetching tasklist: {tasklist_id}")
              page_token = None

              while True:
                  # ── Thử endpoint v1 thay vì v2 ──
                  url = f'https://open.larksuite.com/open-apis/task/v2/tasklists/{tasklist_id}/tasks?page_size=50'
                  if page_token:
                      url += f'&page_token={page_token}'

                  print(f"GET {url}")
                  data = lark_get(url)
                  print(f"Response code: {data.get('code')}, msg: {data.get('msg')}")

                  if data.get('code') != 0:
                      print(f"Lark error: {data.get('msg')}")
                      break

                  items = data.get('data', {}).get('items', [])
                  print(f"Items count: {len(items)}")
                  if items:
                      print(f"First item sample: {json.dumps(items[0], ensure_ascii=False)[:200]}")

                  for t in items:
                      task_guid = t.get('guid') or t.get('id')
                      if not task_guid:
                          print(f"No guid found in: {t}")
                          continue

                      # Lấy chi tiết task
                      detail_url = f'https://open.larksuite.com/open-apis/task/v2/tasks/{task_guid}'
                      detail = lark_get(detail_url)
                      td = detail.get('data', {}).get('task', t)

                      all_tasks.append({
                          'taskId':     td.get('guid'),
                          'title':      td.get('summary'),
                          'status': 'completed' if td.get('completed_at') and td.get('completed_at') != '0' else 'in_progress',
                          'startDate':  parse_ts((td.get('start') or {}).get('timestamp')),
                          'dueDate':    parse_ts((td.get('due') or {}).get('timestamp')),
                          'assignees':  [
                              {'userId': m['id'], 'type': m.get('type')}
                              for m in td.get('members', [])
                              if m.get('role') == 'assignee'
                          ],
                          'tasklistId': tasklist_id,
                      })

                  if data.get('data', {}).get('has_more'):
                      page_token = data['data']['page_token']
                  else:
                      break

          output = {
              'generatedAt': datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'total':       len(all_tasks),
              'tasks':       all_tasks,
          }

          with open('lark-tasks.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"\nDone — total tasks: {len(all_tasks)}")
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lark-tasks.json
          git diff --cached --quiet || git commit -m "Update lark tasks - $(date +'%Y-%m-%d')"
          git push
