name: Collect Standup Responses

on:
  push:
    paths:
      - 'responses.json'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Send individual response to PM
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          PM_OPEN_ID:      ${{ secrets.PM_OPEN_ID }}
        run: |
          python3 << 'EOF'
          import json, os
          from datetime import datetime, timezone
          import urllib.request, urllib.error

          APP_ID     = os.environ['LARK_APP_ID']
          APP_SECRET = os.environ['LARK_APP_SECRET']
          PM_OPEN_ID = os.environ['PM_OPEN_ID']
          TODAY      = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          TODAY_LABEL = datetime.now(timezone.utc).strftime('%d/%m/%Y')

          # ── Bot token ──
          def get_bot_token():
              payload = json.dumps({"app_id": APP_ID, "app_secret": APP_SECRET}).encode()
              req = urllib.request.Request(
                  "https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal",
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())
              if data.get("code") != 0:
                  raise Exception(f"Bot token failed: {data}")
              return data["tenant_access_token"]

          BOT_TOKEN = get_bot_token()

          def lark_post(url, payload):
              body = json.dumps(payload).encode()
              req = urllib.request.Request(
                  url, data=body,
                  headers={
                      "Authorization": f"Bearer {BOT_TOKEN}",
                      "Content-Type":  "application/json",
                  },
                  method="POST"
              )
              with urllib.request.urlopen(req) as res:
                  return json.loads(res.read())

          # ── Đọc responses.json ──
          with open("responses.json", encoding="utf-8") as f:
              data = json.load(f)

          responses  = data.get("responses", [])
          total_submitted = len(responses)

          if not responses:
              print("No responses yet.")
              exit(0)

          # ── Lấy response mới nhất (sort theo submittedAt) ──
          latest = sorted(responses, key=lambda r: r.get("submittedAt", ""), reverse=True)[0]

          # ── Tổng số member ──
          total_members = 0
          try:
              with open("lark-tasks.json", encoding="utf-8") as f:
                  lark_data = json.load(f)
              member_ids = set()
              for task in lark_data.get("tasks", []):
                  if task.get("status") != "completed":
                      for a in task.get("assignees", []):
                          if a.get("userId"):
                              member_ids.add(a["userId"])
              total_members = len(member_ids)
          except:
              total_members = total_submitted

          # ── Build card ──
          user_id      = latest.get("userId", "unknown")
          tasks        = latest.get("tasks", [])
          message      = latest.get("message", "")
          submitted_at = latest.get("submittedAt", "")

          task_lines = []
          for t in tasks:
              progress = t.get("progress", "—")
              title    = t.get("title", "")
              task_lines.append(f"**{title}**\n  📊 {progress}")

          task_text = "\n\n".join(task_lines)
          if message:
              task_text += f"\n\n💬 _{message}_"

          card = {
              "config": {"wide_screen_mode": True},
              "header": {
                  "title": {
                      "tag":     "plain_text",
                      "content": f"📋 Standup mới — {TODAY_LABEL}"
                  },
                  "template": "orange"
              },
              "elements": [
                  {
                      "tag": "div",
                      "text": {
                          "tag":     "lark_md",
                          "content": f"👤 **{user_id}** vừa submit\n📅 {submitted_at[:16].replace('T', ' ')} UTC"
                      }
                  },
                  {"tag": "hr"},
                  {
                      "tag": "div",
                      "text": {
                          "tag":     "lark_md",
                          "content": task_text
                      }
                  },
                  {"tag": "hr"},
                  {
                      "tag": "div",
                      "text": {
                          "tag":     "lark_md",
                          "content": f"✅ Đã submit: **{total_submitted}/{total_members}** thành viên hôm nay"
                      }
                  }
              ]
          }

          res = lark_post(
              "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=open_id",
              {
                  "receive_id": PM_OPEN_ID,
                  "msg_type":   "interactive",
                  "content":    json.dumps(card)
              }
          )

          if res.get("code") == 0:
              print(f"✅ Sent to PM: {user_id}")
          else:
              print(f"❌ Failed: {res.get('msg')}")

          EOF
