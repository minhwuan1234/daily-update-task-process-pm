name: Collect Standup Responses

on:
  push:
    paths:
      - 'responses/**/*.json'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Send individual response to PM
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          PM_OPEN_ID:      ${{ secrets.PM_OPEN_ID }}
          CHANGED_FILES:   ${{ github.event.commits[0].added }}${{ github.event.commits[0].modified }}
        run: |
          python3 << 'EOF'
          import json, os, glob
          from datetime import datetime, timezone

          APP_ID     = os.environ['LARK_APP_ID']
          APP_SECRET = os.environ['LARK_APP_SECRET']
          PM_OPEN_ID = os.environ['PM_OPEN_ID']
          TODAY      = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          TODAY_LABEL = datetime.now(timezone.utc).strftime('%d/%m/%Y')

          import urllib.request, urllib.error

          # ── Bot token ──
          def get_bot_token():
              payload = json.dumps({"app_id": APP_ID, "app_secret": APP_SECRET}).encode()
              req = urllib.request.Request(
                  "https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal",
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())
              if data.get("code") != 0:
                  raise Exception(f"Bot token failed: {data}")
              return data["tenant_access_token"]

          BOT_TOKEN = get_bot_token()

          def lark_post(url, payload):
              body = json.dumps(payload).encode()
              req = urllib.request.Request(
                  url, data=body,
                  headers={
                      "Authorization": f"Bearer {BOT_TOKEN}",
                      "Content-Type":  "application/json",
                  },
                  method="POST"
              )
              with urllib.request.urlopen(req) as res:
                  return json.loads(res.read())

          # ── Tìm file response vừa được push ──
          # Lấy file mới nhất trong responses/TODAY/
          response_files = sorted(glob.glob(f"responses/{TODAY}/*.json"))
          if not response_files:
              print("No response files found, skipping.")
              exit(0)

          # Lấy file được modified gần nhất
          latest_file = max(response_files, key=os.path.getmtime)
          print(f"Processing: {latest_file}")

          with open(latest_file, encoding='utf-8') as f:
              r = json.load(f)

          # ── Đọc tổng số member ──
          total_members = 0
          submitted = len(response_files)
          try:
              with open("lark-tasks.json", encoding='utf-8') as f:
                  lark_data = json.load(f)
              member_ids = set()
              for task in lark_data.get("tasks", []):
                  if task.get("status") != "completed":
                      for a in task.get("assignees", []):
                          if a.get("userId"):
                              member_ids.add(a["userId"])
              total_members = len(member_ids)
          except:
              total_members = submitted

          # ── Build card cho PM ──
          user_id = r.get("userId", "unknown")
          tasks   = r.get("tasks", [])
          message = r.get("message", "")
          submitted_at = r.get("submittedAt", "")

          task_lines = []
          for t in tasks:
              progress = t.get("progress", "—")
              title    = t.get("title", "")
              task_lines.append(f"**{title}**
  📊 {progress}")

          task_text = "

".join(task_lines)
          if message:
              task_text += f"

💬 _{message}_"

          card = {
              "config": {"wide_screen_mode": True},
              "header": {
                  "title": {
                      "tag":     "plain_text",
                      "content": f"📋 Standup mới — {TODAY_LABEL}"
                  },
                  "template": "orange"
              },
              "elements": [
                  {
                      "tag": "div",
                      "text": {
                          "tag":     "lark_md",
                          "content": f"👤 **{user_id}** vừa submit
📅 {submitted_at[:16].replace('T', ' ')} UTC"
                      }
                  },
                  {"tag": "hr"},
                  {
                      "tag": "div",
                      "text": {
                          "tag":     "lark_md",
                          "content": task_text
                      }
                  },
                  {"tag": "hr"},
                  {
                      "tag": "div",
                      "text": {
                          "tag":     "lark_md",
                          "content": f"✅ Đã submit: **{submitted}/{total_members}** thành viên hôm nay"
                      }
                  }
              ]
          }

          res = lark_post(
              "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=open_id",
              {
                  "receive_id": PM_OPEN_ID,
                  "msg_type":   "interactive",
                  "content":    json.dumps(card)
              }
          )

          if res.get("code") == 0:
              print(f"✅ Sent to PM: {user_id} response")
          else:
              print(f"❌ Failed: {res.get('msg')}")

          EOF
