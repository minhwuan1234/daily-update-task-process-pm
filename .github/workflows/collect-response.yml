name: Collect Standup Responses

on:
  repository_dispatch:
    types: [standup-response]
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Save response + send to PM
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          PM_OPEN_ID:      ${{ secrets.PM_OPEN_ID }}
          PAYLOAD:         ${{ toJson(github.event.client_payload) }}
        run: |
          python3 << 'EOF'
          import json, os
          from datetime import datetime, timezone
          import urllib.request, urllib.error

          APP_ID      = os.environ['LARK_APP_ID']
          APP_SECRET  = os.environ['LARK_APP_SECRET']
          PM_OPEN_ID  = os.environ['PM_OPEN_ID']
          from datetime import timedelta
          VN_TZ       = timezone(timedelta(hours=7))
          TODAY_LABEL = datetime.now(VN_TZ).strftime('%d/%m/%Y')

          # ── Parse payload từ form ──
          payload = json.loads(os.environ['PAYLOAD'])
          user_id = payload.get('userId', 'unknown')
          date    = payload.get('date', datetime.now(timezone.utc).strftime('%Y-%m-%d'))

          print(f"Received response from: {user_id} ({date})")

          # ── Đọc members.json ──
          members = {}
          try:
              with open('members.json', encoding='utf-8') as f:
                  members = json.load(f)
          except:
              pass

          # Đảo ngược members.json: { "Tên": "open_id" } → { "open_id": "Tên" }
          id_to_name   = {v: k for k, v in members.items()}
          display_name = id_to_name.get(user_id, user_id)

          # ── Đọc responses.json hiện tại ──
          existing = {'date': date, 'responses': []}
          try:
              with open('responses.json', encoding='utf-8') as f:
                  existing = json.load(f)
          except:
              pass

          if existing.get('date') != date:
              existing = {'date': date, 'responses': []}

          idx = next((i for i, r in enumerate(existing['responses']) if r.get('userId') == user_id), -1)
          if idx >= 0:
              existing['responses'][idx] = payload
          else:
              existing['responses'].append(payload)

          with open('responses.json', 'w', encoding='utf-8') as f:
              json.dump(existing, f, ensure_ascii=False, indent=2)

          os.system('git config user.name "github-actions[bot]"')
          os.system('git config user.email "github-actions[bot]@users.noreply.github.com"')
          os.system('git add responses.json')
          os.system(f'git diff --cached --quiet || git commit -m "standup: {user_id} - {date}"')
          os.system('git push')

          print(f"✅ Saved response for {display_name}")

          # ── Bot token ──
          def get_bot_token():
              payload_data = json.dumps({'app_id': APP_ID, 'app_secret': APP_SECRET}).encode()
              req = urllib.request.Request(
                  'https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal',
                  data=payload_data,
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())
              if data.get('code') != 0:
                  raise Exception(f"Bot token failed: {data}")
              return data['tenant_access_token']

          BOT_TOKEN = get_bot_token()

          def lark_post(url, body):
              req = urllib.request.Request(
                  url,
                  data=json.dumps(body).encode(),
                  headers={
                      'Authorization': f'Bearer {BOT_TOKEN}',
                      'Content-Type': 'application/json',
                  },
                  method='POST'
              )
              with urllib.request.urlopen(req) as res:
                  return json.loads(res.read())

          # ── Tổng số member ──
          total_members = 0
          try:
              with open('lark-tasks.json', encoding='utf-8') as f:
                  lark_data = json.load(f)
              member_ids = set()
              for task in lark_data.get('tasks', []):
                  if task.get('status') != 'completed':
                      for a in task.get('assignees', []):
                          if a.get('userId'):
                              member_ids.add(a['userId'])
              total_members = len(member_ids)
          except:
              total_members = len(existing['responses'])

          total_submitted = len(existing['responses'])

          # ── Build Lark card ──
          tasks        = payload.get('tasks', [])
          message      = payload.get('message', '')
          submitted_at = payload.get('submittedAt', '')

          # Build task elements với hr giữa các task
          task_elements = []
          for i, t in enumerate(tasks):
              progress = t.get('progress', '—')
              title    = t.get('title', '')
              task_elements.append({
                  'tag': 'div',
                  'text': {
                      'tag':     'lark_md',
                      'content': f'**{title}**\n  📈 Progress: {progress}'
                  }
              })
              if i < len(tasks) - 1:
                  task_elements.append({'tag': 'hr'})

          if message:
              task_elements.append({'tag': 'hr'})
              task_elements.append({
                  'tag': 'div',
                  'text': {
                      'tag':     'lark_md',
                      'content': f'🗒️ Comment: _{message}_'
                  }
              })

          card = {
              'config': {'wide_screen_mode': True},
              'header': {
                  'title': {
                      'tag':     'plain_text',
                      'content': f'🌿 Update tình hình — {TODAY_LABEL}'
                  },
                  'template': 'green'
              },
              'elements': [
                  {
                      'tag': 'div',
                      'text': {
                          'tag':     'lark_md',
                          'content': f'👤 **{display_name}** vừa submit\n📅 {(datetime.fromisoformat(submitted_at.replace("Z","+00:00")).astimezone(VN_TZ)).strftime("%d/%m/%Y %H:%M")} (GMT+7)'
                      }
                  },
                  {'tag': 'hr'},
                  *task_elements,
                  {'tag': 'hr'},
                  {
                      'tag': 'div',
                      'text': {
                          'tag':     'lark_md',
                          'content': f'✅ Đã submit: **{total_submitted}/{total_members}** thành viên hôm nay'
                      }
                  }
              ]
          }

          MY_OPEN_ID = 'ou_a3cd717fbf6c8058d12c76c980f52eb7'
          receivers  = list({PM_OPEN_ID, MY_OPEN_ID})  # dùng set để tránh gửi 2 lần nếu trùng

          for receiver in receivers:
              res = lark_post(
                  'https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=open_id',
                  {
                      'receive_id': receiver,
                      'msg_type':   'interactive',
                      'content':    json.dumps(card)
                  }
              )
              label = 'PM' if receiver == PM_OPEN_ID else 'Minh Quân'
              if res.get('code') == 0:
                  print(f'✅ Sent to {label} ({receiver})')
              else:
                  print(f'❌ Failed {label}: {res.get("msg")}')

          EOF
