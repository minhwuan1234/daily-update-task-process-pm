name: Receive Daily Tasks

on:
  repository_dispatch:
    types: [daily-update-task-process-pm]

jobs:
  save-tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Save tasks to JSON
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python3 -c "
          import os, json
          payload = json.loads(os.environ['PAYLOAD'])
          with open('daily-tasks.json', 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          "

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-tasks.json
          git diff --cached --quiet || git commit -m "Update daily tasks - ${{ github.event.client_payload.date }}"
          git push
