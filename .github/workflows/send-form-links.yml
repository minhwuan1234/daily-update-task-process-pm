name: Send Form Links to Members

on:
  workflow_run:
    workflows: ["Fetch Lark Tasks"]
    types: [completed]
  workflow_dispatch:

jobs:
  send-links:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Send form link to each member via Lark Bot DM
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          FORM_BASE_URL:   "http://127.0.0.1:5500/index.html"
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, urllib.error
          from datetime import datetime, timezone

          APP_ID        = os.environ['LARK_APP_ID']
          APP_SECRET    = os.environ['LARK_APP_SECRET']
          FORM_BASE_URL = os.environ['FORM_BASE_URL']
          TODAY         = datetime.now(timezone.utc).strftime('%d/%m/%Y')

          # ══════════════════════════════════════
          # BƯỚC 1: Lấy Bot tenant_access_token
          # ══════════════════════════════════════
          def get_bot_token():
              payload = json.dumps({
                  "app_id":     APP_ID,
                  "app_secret": APP_SECRET,
              }).encode()
              req = urllib.request.Request(
                  "https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal",
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())
              if data.get("code") != 0:
                  raise Exception(f"Bot token failed: {data}")
              token = data["tenant_access_token"]
              print(f"✅ Bot token: {token[:20]}...")
              return token

          BOT_TOKEN = get_bot_token()

          # ══════════════════════════════════════
          # HELPERS
          # ══════════════════════════════════════
          def lark_post(url, payload):
              body = json.dumps(payload).encode()
              req = urllib.request.Request(
                  url,
                  data=body,
                  headers={
                      "Authorization": f"Bearer {BOT_TOKEN}",
                      "Content-Type":  "application/json",
                  },
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req) as res:
                      return json.loads(res.read())
              except urllib.error.HTTPError as e:
                  print(f"POST {url} → HTTPError {e.code}: {e.read().decode()}")
                  raise

          # ══════════════════════════════════════
          # BƯỚC 2: Đọc + group tasks
          # userId trong lark-tasks.json thực chất
          # là open_id (prefix ou_) — dùng thẳng
          # ══════════════════════════════════════
          with open("lark-tasks.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          user_tasks = {}
          for task in data.get("tasks", []):
              if task.get("status") == "completed":
                  continue
              for assignee in task.get("assignees", []):
                  open_id = assignee.get("userId")  # thực ra là open_id
                  if not open_id:
                      continue
                  user_tasks.setdefault(open_id, []).append(task)

          print(f"Found {len(user_tasks)} members with active tasks\n")

          # ══════════════════════════════════════
          # BƯỚC 3: Build card + gửi DM
          # ══════════════════════════════════════
          def format_task_lines(tasks):
              lines = []
              for i, t in enumerate(tasks[:2], 1):
                  due = ""
                  if t.get("dueDate"):
                      d = datetime.strptime(t["dueDate"], "%Y-%m-%dT%H:%M:%SZ")
                      due = f" · due **{d.strftime('%d/%m')}**"
                  lines.append(f"{i}. {t['title']}{due}")
              return "\n".join(lines)

          def build_card(open_id, tasks):
              # Build task elements với hr giữa các task
              task_elements = []
              for i, t in enumerate(tasks[:2], 1):
                  due = ""
                  if t.get("dueDate"):
                      d = datetime.strptime(t["dueDate"], "%Y-%m-%dT%H:%M:%SZ")
                      due = f" · due **{d.strftime('%d/%m')}**"
                  task_elements.append({
                      "tag": "div",
                      "text": {
                          "tag":     "lark_md",
                          "content": f"{i}. {t['title']}{due}"
                      }
                  })
                  if i < min(len(tasks), 2):
                      task_elements.append({"tag": "hr"})

              return {
                  "config": {"wide_screen_mode": True},
                  "header": {
                      "title": {
                          "tag":     "plain_text",
                          "content": f"🌿 Update tình hình — {TODAY}"
                      },
                      "template": "green"
                  },
                  "elements": [
                      {
                          "tag": "div",
                          "text": {
                              "tag":     "lark_md",
                              "content": f"Xin chào! Hôm nay bạn có **{len(tasks)} task** cần update:"
                          }
                      },
                      {"tag": "hr"},
                      *task_elements,
                      {"tag": "hr"},
                      {
                          "tag": "action",
                          "actions": [{
                              "tag":  "button",
                              "text": {
                                  "tag":     "plain_text",
                                  "content": "✍️ Điền Daily Standup"
                              },
                              "type": "primary",
                              "url":  f"{FORM_BASE_URL}?userId={open_id}"
                          }]
                      },
                      {
                          "tag": "note",
                          "elements": [{
                              "tag":     "plain_text",
                              "content": "Form sẽ tự điền task của bạn. Chỉ cần chọn progress và submit 🚀"
                          }]
                      }
                  ]
              }

          def send_dm(open_id, tasks):
              card = build_card(open_id, tasks)
              res = lark_post(
                  "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=open_id",
                  {
                      "receive_id": open_id,
                      "msg_type":   "interactive",
                      "content":    json.dumps(card)
                  }
              )
              if res.get("code") == 0:
                  print(f"  ✅ Sent to {open_id} ({len(tasks)} tasks)")
              else:
                  print(f"  ❌ Failed {open_id}: {res.get('msg')} (code {res.get('code')})")
              return res

          # ══════════════════════════════════════
          # MAIN LOOP
          # ══════════════════════════════════════
          results = []
          for open_id, tasks in user_tasks.items():
              print(f"Processing: {open_id}")
              res = send_dm(open_id, tasks)
              results.append({
                  "openId":    open_id,
                  "taskCount": len(tasks),
                  "success":   res.get("code") == 0
              })

          success = sum(1 for r in results if r["success"])
          print(f"\n📊 Done: {success}/{len(results)} DMs sent successfully")
          for r in results:
              status = "✅" if r["success"] else "❌"
              print(f"  {status} {r['openId']} — {r['taskCount']} tasks")

          EOF
