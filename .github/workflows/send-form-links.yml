name: Send Form Links to Members

on:
  workflow_run:
    workflows: ["Receive Daily Tasks"]
    types: [completed]
  workflow_dispatch:

jobs:
  send-links:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Send form link to each member via Lark Bot DM
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          FORM_BASE_URL:   "https://minhwuan1234.github.io/daily-update-task-process-pm/index.html"
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, urllib.error
          from datetime import datetime, timezone

          APP_ID        = os.environ['LARK_APP_ID']
          APP_SECRET    = os.environ['LARK_APP_SECRET']
          FORM_BASE_URL = os.environ['FORM_BASE_URL']
          TODAY         = datetime.now(timezone.utc).strftime('%d/%m/%Y')

          # ── Bot token ──
          def get_bot_token():
              payload = json.dumps({"app_id": APP_ID, "app_secret": APP_SECRET}).encode()
              req = urllib.request.Request(
                  "https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal",
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read())
              if data.get("code") != 0:
                  raise Exception(f"Bot token failed: {data}")
              return data["tenant_access_token"]

          BOT_TOKEN = get_bot_token()
          print(f"✅ Bot token: {BOT_TOKEN[:20]}...")

          def lark_post(url, payload):
              body = json.dumps(payload).encode()
              req = urllib.request.Request(
                  url, data=body,
                  headers={
                      "Authorization": f"Bearer {BOT_TOKEN}",
                      "Content-Type":  "application/json",
                  },
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req) as res:
                      return json.loads(res.read())
              except urllib.error.HTTPError as e:
                  print(f"HTTPError {e.code}: {e.read().decode()}")
                  raise

          # ── Đọc daily-tasks.json từ N8N ──
          with open("daily-tasks.json", "r", encoding="utf-8") as f:
              daily = json.load(f)

          # ── Đọc members.json: { "Tên": "open_id" } ──
          with open("members.json", "r", encoding="utf-8") as f:
              members_map = json.load(f)

          print(f"Found {len(daily.get('members', []))} members in daily-tasks.json")

          # ── Build card + gửi DM ──
          def format_task_lines(tasks):
              lines = []
              for i, t in enumerate(tasks[:2], 1):
                  due = f" · due **{t.get('dueDate', '')}**" if t.get('dueDate') else ''
                  lines.append(f"{i}. {t.get('task', '')}{due}")
              return "\n".join(lines)

          def build_card(open_id, tasks):
              task_elements = []
              for i, t in enumerate(tasks[:2], 1):
                  due = f" · due **{t.get('dueDate', '')}**" if t.get('dueDate') else ''
                  task_elements.append({
                      "tag": "div",
                      "text": {
                          "tag":     "lark_md",
                          "content": f"{i}. {t.get('task', '')}{due}"
                      }
                  })
                  if i < min(len(tasks), 2):
                      task_elements.append({"tag": "hr"})

              return {
                  "config": {"wide_screen_mode": True},
                  "header": {
                      "title": {
                          "tag":     "plain_text",
                          "content": f"🌿 Update tình hình — {TODAY}"
                      },
                      "template": "green"
                  },
                  "elements": [
                      {
                          "tag": "div",
                          "text": {
                              "tag":     "lark_md",
                              "content": f"Xin chào! Hôm nay bạn có **{len(tasks[:2])} task** cần update:"
                          }
                      },
                      {"tag": "hr"},
                      *task_elements,
                      {"tag": "hr"},
                      {
                          "tag": "action",
                          "actions": [{
                              "tag":  "button",
                              "text": {"tag": "plain_text", "content": "✍️ Điền Daily Standup"},
                              "type": "primary",
                              "url":  f"{FORM_BASE_URL}?userId={open_id}"
                          }]
                      },
                      {
                          "tag": "note",
                          "elements": [{
                              "tag":     "plain_text",
                              "content": "Form sẽ tự điền task của bạn. Chỉ cần chọn progress và submit 🚀"
                          }]
                      }
                  ]
              }

          PM_RECEIVERS = [
              "ou_7efb0c22f47740644cf374252d01fdba",  # Ánh
              "ou_f56b91faf68ec98016490c56aac3daf2",  # Hà
              "ou_e7ba57d42ce06163819095c8ed4685ab",  # Giang
              "ou_a3cd717fbf6c8058d12c76c980f52eb7",  # Minh Quân
          ]

          # ── TEST MODE: chỉ gửi cho Minh Quân ──
          TEST_OPEN_ID = "ou_a3cd717fbf6c8058d12c76c980f52eb7"

          results = []
          for member in daily.get("members", []):
              name  = member.get("member", "")
              tasks = member.get("tasks", [])
              if not tasks:
                  continue

              open_id = members_map.get(name)
              if not open_id:
                  print(f"  ⚠️ {name}: không tìm thấy userId")
                  continue

              print(f"[TEST] Sending {name}'s card to Minh Quân")
              card = build_card(open_id, tasks)
              res  = lark_post(
                  "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=open_id",
                  {"receive_id": TEST_OPEN_ID, "msg_type": "interactive", "content": json.dumps(card)}
              )
              if res.get("code") == 0:
                  print(f"  ✅ Sent {name}'s card to Minh Quân")
              else:
                  print(f"  ❌ Failed: {res.get('msg')}")
              results.append({"name": name, "success": res.get("code") == 0})

          success = sum(1 for r in results if r["success"])
          print(f"\n📊 [TEST] Done: {success}/{len(results)} cards sent to Minh Quân")
          EOF
