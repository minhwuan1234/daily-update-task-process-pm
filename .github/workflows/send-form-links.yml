name: Send Form Links to Members

on:
  workflow_run:
    workflows: ["Fetch Lark Tasks"]
    types: [completed]
  workflow_dispatch:

jobs:
  send-links:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Send form link to each member via Lark DM
        env:
          LARK_USER_TOKEN: ${{ secrets.LARK_USER_TOKEN }}
          FORM_BASE_URL:   "http://127.0.0.1:5500/index.html"
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, urllib.error
          from datetime import datetime, timezone

          USER_TOKEN    = os.environ['LARK_USER_TOKEN']
          FORM_BASE_URL = os.environ['FORM_BASE_URL']
          TODAY         = datetime.now(timezone.utc).strftime('%d/%m/%Y')

          # ══════════════════════════════════════
          # HELPERS
          # ══════════════════════════════════════
          def lark_post(url, payload):
              body = json.dumps(payload).encode()
              req = urllib.request.Request(
                  url,
                  data=body,
                  headers={
                      "Authorization": f"Bearer {USER_TOKEN}",
                      "Content-Type":  "application/json",
                  },
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req) as res:
                      return json.loads(res.read())
              except urllib.error.HTTPError as e:
                  print(f"POST {url} → HTTPError {e.code}: {e.read().decode()}")
                  raise

          # ══════════════════════════════════════
          # BƯỚC 1: Đọc + group tasks theo user_id
          # ══════════════════════════════════════
          with open("lark-tasks.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          user_tasks = {}
          for task in data.get("tasks", []):
              if task.get("status") == "completed":
                  continue
              for assignee in task.get("assignees", []):
                  uid = assignee.get("userId")
                  if not uid:
                      continue
                  user_tasks.setdefault(uid, []).append(task)

          print(f"Found {len(user_tasks)} members with active tasks\n")

          # ══════════════════════════════════════
          # BƯỚC 2: Build card + gửi DM
          # ══════════════════════════════════════
          def format_task_lines(tasks):
              lines = []
              for i, t in enumerate(tasks[:2], 1):
                  due = ""
                  if t.get("dueDate"):
                      d = datetime.strptime(t["dueDate"], "%Y-%m-%dT%H:%M:%SZ")
                      due = f" · due **{d.strftime('%d/%m')}**"
                  lines.append(f"{i}. {t['title']}{due}")
              return "\n".join(lines)

          def build_card(user_id, tasks):
              return {
                  "config": {"wide_screen_mode": True},
                  "header": {
                      "title": {
                          "tag":     "plain_text",
                          "content": f"📋 Daily Standup — {TODAY}"
                      },
                      "template": "orange"
                  },
                  "elements": [
                      {
                          "tag": "div",
                          "text": {
                              "tag":     "lark_md",
                              "content": (
                                  f"Xin chào! Hôm nay bạn có **{len(tasks)} task** cần update:\n\n"
                                  f"{format_task_lines(tasks)}"
                              )
                          }
                      },
                      {"tag": "hr"},
                      {
                          "tag": "action",
                          "actions": [{
                              "tag":  "button",
                              "text": {
                                  "tag":     "plain_text",
                                  "content": "✍️ Điền Daily Standup"
                              },
                              "type": "primary",
                              "url":  f"{FORM_BASE_URL}?userId={user_id}"
                          }]
                      },
                      {
                          "tag": "note",
                          "elements": [{
                              "tag":     "plain_text",
                              "content": "Form sẽ tự điền task của bạn. Chỉ cần chọn progress và submit 🚀"
                          }]
                      }
                  ]
              }

          def send_dm(user_id, tasks):
              card = build_card(user_id, tasks)
              res = lark_post(
                  "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=user_id",
                  {
                      "receive_id": user_id,
                      "msg_type":   "interactive",
                      "content":    json.dumps(card)
                  }
              )
              if res.get("code") == 0:
                  print(f"  ✅ Sent to {user_id} ({len(tasks)} tasks)")
              else:
                  print(f"  ❌ Failed {user_id}: {res.get('msg')} (code {res.get('code')})")
              return res

          # ══════════════════════════════════════
          # MAIN LOOP
          # ══════════════════════════════════════
          results = []
          for user_id, tasks in user_tasks.items():
              print(f"Processing: {user_id}")
              res = send_dm(user_id, tasks)
              results.append({
                  "userId":    user_id,
                  "taskCount": len(tasks),
                  "success":   res.get("code") == 0
              })

          success = sum(1 for r in results if r["success"])
          print(f"\n📊 Done: {success}/{len(results)} DMs sent successfully")
          for r in results:
              status = "✅" if r["success"] else "❌"
              print(f"  {status} {r['userId']} — {r['taskCount']} tasks")

          EOF
