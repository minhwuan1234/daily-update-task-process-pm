<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Standup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Freeman&family=Rethink+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">
    <div class="card">

      <!-- LEFT PANEL -->
      <div class="left-panel">
        <div class="hero-gif"></div>
        <div class="hero-blur"></div>
        <div class="quote-overlay">
          <span class="quote-mark">"</span>
          <p class="quote-text" id="daily-quote"></p>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right-panel">

        <!-- LOADING -->
        <div id="state-loading" class="state-box">
          <div class="spinner"></div>
          <p>Đang tải task của bạn...</p>
        </div>

        <!-- ERROR -->
        <div id="state-error" class="state-box" style="display:none;">
          <p class="state-icon">⚠️</p>
          <p id="error-msg">Không tìm thấy task.</p>
        </div>

        <!-- SUCCESS -->
        <div id="state-success" class="state-box" style="display:none;">
          <p class="state-icon">✅</p>
          <p>Standup của bạn đã được ghi nhận!</p>
          <p class="state-sub">Cảm ơn bạn đã update hôm nay 🙌</p>
        </div>

        <!-- FORM -->
        <div id="state-form" style="display:none; flex-direction:column; gap:32px; width:100%;">

          <div class="form-header">
            <div class="title-row">
              <div class="gap-8">
                <h1 class="form-title">Daily Standup<span class="spark">✦</span></h1>
                <p class="form-subtitle">
                  Checkin hôm nay — <span id="today-label"></span>
                </p>
              </div>
              <div class="rocket-icon">🚀</div>
            </div>
          </div>

          <div class="form-body">

            <!-- TASK 1 -->
            <div class="field-group">
              <label class="field-label">
                Task 1
                <span class="badge-due" id="due1"></span>
              </label>
              <input class="field-input is-autofilled" id="task1-title" type="text" readonly />
            </div>

            <div class="field-group">
              <label class="field-label">Task 1 Progress</label>
              <div class="progress-picker" id="picker1" data-value="">
                <button class="progress-btn" data-val="10">10%</button>
                <button class="progress-btn" data-val="20">20%</button>
                <button class="progress-btn" data-val="30">30%</button>
                <button class="progress-btn" data-val="40">40%</button>
                <button class="progress-btn" data-val="50">50%</button>
                <button class="progress-btn" data-val="60">60%</button>
                <button class="progress-btn" data-val="70">70%</button>
                <button class="progress-btn" data-val="80">80%</button>
                <button class="progress-btn" data-val="90">90%</button>
                <button class="progress-btn is-done" data-val="100">100%</button>
              </div>
              <div class="progress-track-wrap">
                <div class="progress-track">
                  <div class="progress-fill" id="fill1"></div>
                </div>
                <span class="progress-value-label" id="label1">—</span>
              </div>
            </div>

            <!-- TASK 2 (ẩn nếu chỉ có 1 task) -->
            <div class="field-group" id="group-task2" style="display:none;">
              <label class="field-label">
                Task 2
                <span class="badge-due" id="due2"></span>
              </label>
              <input class="field-input is-autofilled" id="task2-title" type="text" readonly />
            </div>

            <div class="field-group" id="group-prog2" style="display:none;">
              <label class="field-label">Task 2 Progress</label>
              <div class="progress-picker" id="picker2" data-value="">
                <button class="progress-btn" data-val="10">10%</button>
                <button class="progress-btn" data-val="20">20%</button>
                <button class="progress-btn" data-val="30">30%</button>
                <button class="progress-btn" data-val="40">40%</button>
                <button class="progress-btn" data-val="50">50%</button>
                <button class="progress-btn" data-val="60">60%</button>
                <button class="progress-btn" data-val="70">70%</button>
                <button class="progress-btn" data-val="80">80%</button>
                <button class="progress-btn" data-val="90">90%</button>
                <button class="progress-btn is-done" data-val="100">100%</button>
              </div>
              <div class="progress-track-wrap">
                <div class="progress-track">
                  <div class="progress-fill" id="fill2"></div>
                </div>
                <span class="progress-value-label" id="label2">—</span>
              </div>
            </div>

            <!-- MESSAGE -->
            <div class="field-group">
              <label class="field-label">Cần bọn chị hỗ trợ gì hem ?</label>
              <textarea class="field-textarea" id="message"
                placeholder="Cần support ở task nào cứ nhắn nha"></textarea>
            </div>

            <button class="submit-btn" id="submit-btn" type="button">
              Submit
            </button>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
  // ── Daily Quote + Image (đổi theo ngày, múi giờ VN) ──
  const QUOTES = [
    "I heard this story about a fish. He swims up to this older fish and says, I'm trying to find this thing they call the ocean. The ocean? says the older fish. That's what you're in right now. This? says the young fish. This is water. What I want is the ocean.",
    "I think I have this thing where everybody has to think I'm the greatest. And if they aren't completely knocked out and dazzled and slightly intimidated by me, I don't feel good about myself.",
    "At the end of the day, it's not about what you have or even what you've accomplished. It's about who you've lifted up, who you've made better",
    "Some people can't believe in themselves until someone else believes in them first.",
    "Love is the one thing we're capable of perceiving that transcends dimensions of time and space",
    "Not anyone can become a great artist, but a great artist can come from anywhere."
  ];
  const IMAGES = [
    'assets/hero-1.png',
    'assets/hero-2.png',
    'assets/hero-3.png',
    'assets/hero-4.png',
    'assets/hero-5.png',
    'assets/hero-6.png'
  ];
  const vnDay = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Ho_Chi_Minh' })).getDay();
  const dayIdx = vnDay === 0 ? 5 : (vnDay - 1) % QUOTES.length;
  document.getElementById('daily-quote').textContent = QUOTES[dayIdx];
  document.querySelector('.hero-gif').style.backgroundImage = `url('${IMAGES[dayIdx]}')`;

  // ═══════════════════════════════════════════════
  // CONFIG
  // ═══════════════════════════════════════════════
  const GITHUB_RAW   = 'https://raw.githubusercontent.com/minhwuan1234/daily-update-task-process-pm/main/lark-tasks.json';
  const GITHUB_OWNER = 'minhwuan1234';
  const GITHUB_REPO  = 'daily-update-task-process-pm';
  const GITHUB_PAT   = '%%FORM_PAT%%';

  const qs  = (id) => document.getElementById(id);
  const uid = () => new URLSearchParams(location.search).get('userId');

  // ── Progress picker logic ──
  function initPicker(pickerId, fillId, labelId) {
    const picker = qs(pickerId);
    const fill   = qs(fillId);
    const label  = qs(labelId);

    picker.querySelectorAll('.progress-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        picker.querySelectorAll('.progress-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const val = btn.dataset.val;
        picker.dataset.value = val;
        fill.style.width = val + '%';
        label.textContent = val + '%';
        if (val == 100) {
          fill.style.background = 'linear-gradient(90deg, #4caf50, #81c784)';
          label.style.color = '#4caf50';
        } else if (val >= 60) {
          fill.style.background = 'linear-gradient(90deg, #FF9333, #ffb347)';
          label.style.color = '#FF9333';
        } else {
          fill.style.background = 'linear-gradient(90deg, #FE8A22, #ffb347)';
          label.style.color = '#FE8A22';
        }
      });
    });
  }

  initPicker('picker1', 'fill1', 'label1');
  initPicker('picker2', 'fill2', 'label2');

  // ── States ──
  function showState(name) {
    ['loading','error','success','form'].forEach(s => {
      const el = qs(`state-${s}`);
      if (!el) return;
      el.style.display = (s === name) ? 'flex' : 'none';
    });
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit' });
  }

  function todayLabel() {
    return new Date().toLocaleDateString('vi-VN', {
      weekday:'long', day:'2-digit', month:'2-digit', year:'numeric'
    });
  }

  // ── Fetch tasks ──
  async function fetchTasksForUser(userId) {
    const res = await fetch(`${GITHUB_RAW}?t=${Date.now()}`);
    if (!res.ok) throw new Error(`GitHub fetch failed: ${res.status}`);
    const data = await res.json();
    return data.tasks
      .filter(t => t.status !== 'completed')
      .filter(t => (t.assignees || []).some(a => a.userId === userId));
  }

  // ── Fill form ──
  function fillForm(tasks) {
    qs('today-label').textContent = todayLabel();
    const t1 = tasks[0];
    const t2 = tasks[1] || null;

    qs('task1-title').value = t1.title || '';
    if (t1.dueDate) qs('due1').textContent = `Due ${fmtDate(t1.dueDate)}`;

    if (t2) {
      qs('task2-title').value = t2.title || '';
      if (t2.dueDate) qs('due2').textContent = `Due ${fmtDate(t2.dueDate)}`;
      qs('group-task2').style.display = 'flex';
      qs('group-prog2').style.display = 'flex';
    }
  }

  // ── Submit ──
  async function handleSubmit() {
    const hasTwoTasks = qs('group-task2').style.display !== 'none';
    const prog1   = qs('picker1').dataset.value;
    const prog2   = hasTwoTasks ? qs('picker2').dataset.value : null;
    const message = qs('message').value.trim();

    if (!prog1) { highlightPicker('picker1'); return; }
    if (hasTwoTasks && !prog2) { highlightPicker('picker2'); return; }

    const btn = qs('submit-btn');
    btn.disabled    = true;
    btn.textContent = 'Đang gửi...';

    const today  = new Date().toISOString().split('T')[0];
    const userId = uid();

    const payload = {
      userId,
      submittedAt: new Date().toISOString(),
      date: today,
      tasks: [
        { taskId: window._myTasks[0]?.taskId, title: window._myTasks[0]?.title, progress: prog1 + '%' },
        ...(hasTwoTasks ? [{ taskId: window._myTasks[1]?.taskId, title: window._myTasks[1]?.title, progress: prog2 + '%' }] : [])
      ],
      message,
    };

    try {
      await writeToGitHub(today, userId, payload);
      showState('success');
    } catch (err) {
      btn.disabled    = false;
      btn.textContent = 'Submit';
      alert(`❌ Gửi thất bại: ${err.message}`);
    }
  }

  // ── Trigger GitHub Actions via repository_dispatch ──
  // PAT chỉ dùng để trigger workflow, không ghi file trực tiếp
  async function writeToGitHub(date, userId, payload) {
    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${GITHUB_PAT}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          event_type: 'standup-response',
          client_payload: payload
        })
      }
    );

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || `GitHub dispatch error ${res.status}`);
    }
  }

  function highlightPicker(pickerId) {
    const el = qs(pickerId);
    el.classList.add('picker-error');
    el.addEventListener('animationend', () => el.classList.remove('picker-error'), { once: true });
  }

  // ── Init ──
  async function init() {
    const userId = uid();
    if (!userId) {
      showState('error');
      qs('error-msg').textContent = '❌ Link không hợp lệ — thiếu userId. Vui lòng dùng link được gửi qua Lark.';
      return;
    }
    try {
      const tasks = await fetchTasksForUser(userId);
      if (!tasks.length) {
        showState('error');
        qs('error-msg').textContent = `Không tìm thấy task nào cho userId: ${userId}`;
        return;
      }
      window._myTasks = tasks;
      fillForm(tasks);
      showState('form');
    } catch (err) {
      showState('error');
      qs('error-msg').textContent = `❌ Lỗi khi tải data: ${err.message}`;
    }
  }

  qs('submit-btn').addEventListener('click', handleSubmit);
  init();
  </script>

</body>
</html>
